# OpenLineage configuration for Airflow OL provider
# Ref: https://openlineage.io/docs/client/python#http
#
# The standard HTTP transport posts events to Correlator's OL-compatible endpoint.
# Place this file in the Airflow home directory and set OPENLINEAGE_CONFIG env var.

transport:
  type: http
  url: http://demo-correlator:8080
  endpoint: api/v1/lineage
  timeout: 30
