# OpenLineage configuration for Airflow OL provider — Kafka transport
# Ref: https://openlineage.io/docs/client/python#kafka
#
# The Airflow OL provider reads this file at scheduler startup via OPENLINEAGE_CONFIG.
# Airflow task lifecycle events (START, RUNNING, COMPLETE, FAIL) are sent to Kafka.
#
# dbt-ol and GE run as BashOperators inside the same container but override
# OPENLINEAGE_CONFIG to openlineage-http.yml, so they use HTTP instead.

transport:
  type: kafka
  config:
    bootstrap.servers: demo-kafka:29092
  topic: openlineage.events
  flush: true
