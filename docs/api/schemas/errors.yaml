openapi: 3.0.3
info:
  title: Error Response Schemas
  version: 1.0.0
  description: |
    Standard error response schemas for Correlator API.

    Follows RFC 7807 Problem Details standard.

components:
  schemas:
    # RFC 7807 Problem Details (flat, no wrapper)
    # https://datatracker.ietf.org/doc/html/rfc7807
    Error:
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          description: URI reference identifying the problem type (RFC 7807)
          example: "https://getcorrelator.io/problems/400"
        title:
          type: string
          description: Short, human-readable summary of the problem type
          example: "Bad Request"
        status:
          type: integer
          description: HTTP status code (RFC 7807)
          example: 400
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence (RFC 7807)
          example: "Invalid JSON: unexpected end of JSON input"
        instance:
          type: string
          description: The request path that generated the error (RFC 7807)
          example: "/api/v1/lineage/batch"
        correlation_id:
          type: string
          description: Unique ID for tracking this error across systems
          example: "93dac97a-4ee9-42d2-b86a-8a5d20e3ca14"

  examples:
    bad_request:
      summary: Bad request (invalid JSON)
      value:
        type: "https://getcorrelator.io/problems/400"
        title: "Bad Request"
        status: 400
        detail: "Invalid JSON: json: cannot unmarshal object into Go value of type []api.LineageEvent"
        instance: "/api/v1/lineage/batch"
        correlation_id: "3b3894f7-b570-42dc-bef9-2e01c91431ef"

    not_found:
      summary: Resource not found
      value:
        type: "https://getcorrelator.io/problems/404"
        title: "Not Found"
        status: 404
        detail: "Incident not found"
        instance: "/api/v1/incidents/999999"
        correlation_id: "4c898745-f541-43d8-b081-17dd911327e0"

    catch_all_not_found:
      summary: Unknown endpoint
      value:
        type: "https://getcorrelator.io/problems/404"
        title: "Not Found"
        status: 404
        detail: "The requested resource was not found"
        instance: "/api/v1/unknown"
        correlation_id: "1dc0f8e7-8d4f-4f2a-bbf7-762c62ae934f"
