openapi: 3.0.3
info:
  title: Correlation Response Schemas
  version: 1.0.0
  description: |
    Correlation query response schemas for Correlator API.

    These schemas support the 2-click navigation workflow:
    1. Incident list → Incident detail
    2. Incident detail → Root cause analysis with downstream impact

components:
  schemas:
    # GET /api/v1/incidents response
    IncidentListResponse:
      type: object
      required:
        - incidents
        - total
        - limit
        - offset
        - orphan_count
      properties:
        incidents:
          type: array
          items:
            $ref: '#/components/schemas/IncidentSummary'
        total:
          type: integer
          description: Total number of incidents
        limit:
          type: integer
          description: Page size
        offset:
          type: integer
          description: Current offset
        orphan_count:
          type: integer
          description: Number of orphan datasets (namespace aliasing issues)

    # Single incident in list view
    IncidentSummary:
      type: object
      required:
        - id
        - test_name
        - test_type
        - test_status
        - dataset_urn
        - dataset_name
        - producer
        - job_name
        - job_run_id
        - downstream_count
        - has_correlation_issue
        - executed_at
      properties:
        id:
          type: string
        test_name:
          type: string
        test_type:
          type: string
        test_status:
          type: string
          enum: [passed, failed]
        dataset_urn:
          type: string
        dataset_name:
          type: string
        producer:
          type: string
          description: Tool that produced the test result (e.g., "dbt", "great_expectations")
        job_name:
          type: string
        job_run_id:
          type: string
          format: uuid
        downstream_count:
          type: integer
          description: Number of downstream datasets affected
        has_correlation_issue:
          type: boolean
          description: True if the dataset has a namespace aliasing issue (orphan)
        executed_at:
          type: string
          format: date-time

    # GET /api/v1/incidents/{id} response
    IncidentDetailResponse:
      type: object
      required:
        - id
        - test
        - dataset
        - upstream
        - downstream
        - correlation_status
      properties:
        id:
          type: string
        test:
          $ref: '#/components/schemas/TestDetail'
        dataset:
          $ref: '#/components/schemas/DatasetDetail'
        job:
          $ref: '#/components/schemas/JobDetail'
          nullable: true
          description: "null if uncorrelated"
        upstream:
          type: array
          items:
            $ref: '#/components/schemas/UpstreamDataset'
        downstream:
          type: array
          items:
            $ref: '#/components/schemas/DownstreamDataset'
        correlation_status:
          type: string
          enum: [correlated, orphan, unknown]

    TestDetail:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        status:
          type: string
        message:
          type: string
        executed_at:
          type: string
          format: date-time
        duration_ms:
          type: integer
        producer:
          type: string
          description: Tool that produced the test result (e.g., "dbt", "great_expectations")

    DatasetDetail:
      type: object
      properties:
        urn:
          type: string
        name:
          type: string
        namespace:
          type: string

    JobDetail:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        run_id:
          type: string
          format: uuid
        producer:
          type: string
        status:
          type: string
          enum: [START, RUNNING, COMPLETE, ABORT, FAIL]
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        parent:
          $ref: '#/components/schemas/ParentJob'
          nullable: true
        orchestration:
          type: array
          items:
            $ref: '#/components/schemas/OrchestrationNode'

    ParentJob:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        run_id:
          type: string
          format: uuid
        producer:
          type: string
        status:
          type: string
        completed_at:
          type: string
          format: date-time
          nullable: true

    OrchestrationNode:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        run_id:
          type: string
          format: uuid
        producer:
          type: string
        status:
          type: string

    UpstreamDataset:
      type: object
      properties:
        urn:
          type: string
        name:
          type: string
        depth:
          type: integer
        childUrn:
          type: string
          description: Child dataset URN (what this feeds into)
        producer:
          type: string

    DownstreamDataset:
      type: object
      properties:
        urn:
          type: string
        name:
          type: string
        depth:
          type: integer
        parentUrn:
          type: string
          description: Parent dataset URN for tree building
        producer:
          type: string

    # GET /api/v1/health/correlation response
    CorrelationHealthResponse:
      type: object
      required:
        - correlation_rate
        - total_datasets
        - produced_datasets
        - correlated_datasets
        - orphan_datasets
        - suggested_patterns
      properties:
        correlation_rate:
          type: number
          format: float
          description: Fraction of tested datasets that are correlated (0.0 to 1.0)
        total_datasets:
          type: integer
        produced_datasets:
          type: integer
        correlated_datasets:
          type: integer
        orphan_datasets:
          type: array
          items:
            $ref: '#/components/schemas/OrphanDataset'
        suggested_patterns:
          type: array
          items:
            $ref: '#/components/schemas/SuggestedPattern'

    OrphanDataset:
      type: object
      required:
        - dataset_urn
        - test_count
        - last_seen
        - producer
      properties:
        dataset_urn:
          type: string
        test_count:
          type: integer
        last_seen:
          type: string
          format: date-time
        producer:
          type: string
          description: Dominant test producer (e.g., "great_expectations", "dbt")
        likely_match:
          $ref: '#/components/schemas/DatasetMatch'
          nullable: true

    DatasetMatch:
      type: object
      required:
        - dataset_urn
        - confidence
        - match_reason
        - producer
      properties:
        dataset_urn:
          type: string
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
        match_reason:
          type: string
          enum: [exact_table_name, fuzzy_table_name]
        producer:
          type: string
          description: Producer of the matched dataset (e.g., "dbt", "airflow")

    SuggestedPattern:
      type: object
      properties:
        pattern:
          type: string
          description: Pattern describing the orphan namespace format
          example: "postgresql://demo-postgres/marts.{table}"
        canonical:
          type: string
          description: Target canonical namespace format
          example: "postgresql://demo-postgres/demo.marts.{table}"
        resolves_count:
          type: integer
          description: How many orphans this pattern would resolve
        orphans_resolved:
          type: array
          items:
            type: string
          description: List of orphan URNs resolved by this pattern

  examples:
    incidents_list:
      summary: Incident list response
      value:
        incidents:
          - id: "14"
            test_name: "unique_customers_customer_id"
            test_type: "dataQualityAssertion"
            test_status: "failed"
            dataset_urn: "postgresql://demo-postgres/demo.marts.customers"
            dataset_name: "demo.marts.customers"
            producer: "dbt"
            job_name: "demo.marts.jaffle_shop_demo.customers"
            job_run_id: "019cc7d7-23b0-76e0-905d-2299ae1e399a"
            downstream_count: 0
            has_correlation_issue: false
            executed_at: "2026-03-07T10:28:32.018674Z"
          - id: "3"
            test_name: "unique_stg_customers_customer_id"
            test_type: "dataQualityAssertion"
            test_status: "failed"
            dataset_urn: "postgresql://demo-postgres/demo.staging.stg_customers"
            dataset_name: "demo.staging.stg_customers"
            producer: "dbt"
            job_name: "demo.staging.jaffle_shop_demo.stg_customers"
            job_run_id: "019cc7d7-23af-7652-b164-2e2ec1c1273a"
            downstream_count: 2
            has_correlation_issue: false
            executed_at: "2026-03-07T10:28:32.018674Z"
        total: 4
        limit: 20
        offset: 0
        orphan_count: 2

    incident_detail:
      summary: Incident detail response
      value:
        id: "3"
        test:
          name: "unique_stg_customers_customer_id"
          type: "dataQualityAssertion"
          status: "failed"
          message: ""
          executed_at: "2026-03-07T10:28:32.018674Z"
          duration_ms: 0
          producer: "dbt"
        dataset:
          urn: "postgresql://demo-postgres/demo.staging.stg_customers"
          name: "demo.staging.stg_customers"
          namespace: "postgresql://demo-postgres"
        job:
          name: "demo.staging.jaffle_shop_demo.stg_customers"
          namespace: "dbt"
          run_id: "019cc7d7-23af-7652-b164-2e2ec1c1273a"
          producer: "dbt"
          status: "COMPLETE"
          started_at: "2026-03-07T10:28:10.519806Z"
          completed_at: "2026-03-07T10:28:10.573179Z"
          parent:
            name: "dbt-run-jaffle_shop_demo"
            namespace: "dbt"
            run_id: "019cc7d7-1cca-7e52-941e-d7909b5a4455"
            producer: "dbt"
            status: "COMPLETE"
            completed_at: "2026-03-07T10:28:11.312525Z"
          orchestration:
            - name: "dbt-run-jaffle_shop_demo"
              namespace: "dbt"
              run_id: "019cc7d7-1cca-7e52-941e-d7909b5a4455"
              producer: "dbt"
              status: "COMPLETE"
        upstream: []
        downstream:
          - urn: "postgresql://demo-postgres/demo.marts.customers"
            name: "demo.marts.customers"
            depth: 1
            parentUrn: "postgresql://demo-postgres/demo.staging.stg_customers"
            producer: "dbt"
          - urn: "postgresql://demo-postgres/demo.marts.orders"
            name: "demo.marts.orders"
            depth: 1
            parentUrn: "postgresql://demo-postgres/demo.staging.stg_customers"
            producer: "dbt"
        correlation_status: "correlated"

    correlation_health:
      summary: Correlation health response
      value:
        correlation_rate: 0.6666666666666666
        total_datasets: 6
        produced_datasets: 4
        correlated_datasets: 4
        orphan_datasets:
          - dataset_urn: "postgresql://demo-postgres/marts.customers"
            test_count: 5
            last_seen: "2026-03-07T10:29:40.5774Z"
            producer: "great_expectations"
            likely_match:
              dataset_urn: "postgresql://demo-postgres/demo.marts.customers"
              confidence: 1
              match_reason: "exact_table_name"
              producer: "dbt"
          - dataset_urn: "postgresql://demo-postgres/marts.orders"
            test_count: 5
            last_seen: "2026-03-07T10:29:40.649209Z"
            producer: "great_expectations"
            likely_match:
              dataset_urn: "postgresql://demo-postgres/demo.marts.orders"
              confidence: 1
              match_reason: "exact_table_name"
              producer: "dbt"
        suggested_patterns:
          - pattern: "postgresql://demo-postgres/marts.{table}"
            canonical: "postgresql://demo-postgres/demo.marts.{table}"
            resolves_count: 2
            orphans_resolved:
              - "postgresql://demo-postgres/marts.customers"
              - "postgresql://demo-postgres/marts.orders"
